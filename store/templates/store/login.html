{% extends "store/base.html" %}

{% block content %}

<style>

.login-container{
    max-width:450px;
    margin:50px auto;
    background:#ffffff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.login-container h1{
    text-align:center;
    color:#1f2937;
    margin-bottom:10px;
}

.login-container p{
    text-align:center;
    color:#6b7280;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#374151;
}

.form-group input{
    width:100%;
    padding:12px 45px 12px 12px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:15px;
    outline:none;
    transition:.3s;
}

.form-group input:focus{
    border-color:#2563eb;
    box-shadow:0 0 5px rgba(37,99,235,.3);
}

.password-wrapper{
    position:relative;
}

.toggle-password{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:20px;
    user-select:none;
}

.login-btn{
    width:100%;
    background:#2563eb;
    color:white;
    padding:14px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    background:#1d4ed8;
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    color:#2563eb;
    text-decoration:none;
    font-weight:bold;
}

.links a:hover{
    text-decoration:underline;
}

.message{
    background:#fee2e2;
    color:#991b1b;
    padding:12px;
    border-radius:6px;
    margin-bottom:20px;
}

</style>


<div class="login-container">

    <h1>Welcome Back</h1>

    <p>Sign in to your Richbest Store account.</p>

    {% if messages %}

        {% for message in messages %}

            <div class="message">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}


    <form method="POST">

        {% csrf_token %}

        <div class="form-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                placeholder="Enter your username"
                required
            >

        </div>


        <div class="form-group">

            <label>Password</label>

            <div class="password-wrapper">

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >

                <span
                    class="toggle-password"
                    onclick="togglePassword()"
                    id="toggleIcon"
                >
                    👁️
                </span>

            </div>

        </div>


        <button class="login-btn" type="submit">

            Login

        </button>

    </form>


    <div class="links">

        <p>

            Don't have an account?

            <a href="{% url 'register' %}">

                Register

            </a>

        </p>

    </div>

</div>


<script>

function togglePassword(){

    let password=document.getElementById("password");

    let icon=document.getElementById("toggleIcon");

    if(password.type==="password"){

        password.type="text";

        icon.innerHTML="🙈";

    }

    else{

        password.type="password";

        icon.innerHTML="👁️";

    }

}

</script>

{% endblock %}
